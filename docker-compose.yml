# ===========================================================================
# 使用前请先复制环境变量模板：
#   cp .env.example .env
# 然后在 .env 中填写 JWT_USER_SECRET / JWT_ADMIN_SECRET / ADMIN_DEFAULT_PASSWORD
# / ENCRYPTION_KEY / REDIS_PASSWORD 等敏感配置。
# docker-compose 会读取 .env 文件加载这些变量。
#
# 注意：DATABASE_URL 和 REDIS_URL 在 compose 里已经硬编码为容器间地址，
# .env 里不需要再配这两个。
# ===========================================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kebaipay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kebaipay}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kebaipay}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kebaipay-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis}
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$${REDIS_PASSWORD}" --no-auth-warning ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kebaipay-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kebaipay}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      JWT_USER_SECRET: ${JWT_USER_SECRET:?JWT_USER_SECRET must be set in .env}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:?JWT_ADMIN_SECRET must be set in .env}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:?ADMIN_DEFAULT_PASSWORD must be set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      RECHARGE_NOTIFY_URL: ${RECHARGE_NOTIFY_URL:-}
      CASHIER_BASE_URL: ${CASHIER_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TZ: Asia/Shanghai
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- --timeout=3 http://localhost:3000/health/ready | grep -q "ok"']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
