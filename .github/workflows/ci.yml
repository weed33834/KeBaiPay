name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Test + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_pwd
          POSTGRES_DB: kebaipay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:ci_test_pwd@localhost:5432/kebaipay_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_USER_SECRET: ci-user-secret-for-testing-only-32chars
      JWT_ADMIN_SECRET: ci-admin-secret-for-testing-only-32chars
      ADMIN_DEFAULT_PASSWORD: ci-admin-pwd
      ENCRYPTION_KEY: ci-encryption-key-32-chars-minimum!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage --silent

      - name: Build
        run: npm run build
