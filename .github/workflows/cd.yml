name: CD

# 触发条件：
#   1. 推送 v* 格式的 tag（如 v1.0.0、v1.0.0-rc.1）→ 正式发布
#   2. main 分支推送 → 构建最新镜像（tag=main，供预发拉取）
# 手动触发：可指定 image_tag 覆盖默认
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: '自定义镜像 tag（默认 latest）'
        required: false
        default: 'manual'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/temp?schema=public"
        run: npx prisma generate

      - name: Type check
        run: npm run lint

      - name: Unit tests (gate)
        run: npm test -- --silent

      - name: Build
        run: npm run build

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署步骤：占位，需要根据实际部署目标（k8s/SSH）填写
  # 示例：通过 SSH 推到服务器并重启容器
  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Deployment placeholder
        run: |
          echo "Docker image pushed to: ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.image_tag }}"
          echo "请在 DEPLOYMENT.md 中配置目标主机 SSH 密钥与部署脚本后启用本步骤。"
